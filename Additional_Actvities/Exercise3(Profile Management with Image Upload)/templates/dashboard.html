<!DOCTYPE html>
<html>
<head><title>Student Dashboard</title></head>
<body>
    <h1>Profile Management</h1>
    
    <form action="/update" method="post" enctype="multipart/form-data">
        <input type="text" name="user_id" placeholder="Student ID" required>
        <input type="text" name="name" placeholder="New Display Name" required>
        <input type="file" name="file" required>
        <button type="submit">Update Profile</button>
    </form>

    <hr>
    <h2>Current Dashboard</h2>
    {% for user in users %}
        <div>
            <p><strong>Name:</strong> {{ user.name }}</p>
            <img src="{{ url_for('static', filename='uploads/' + user.image_filename) }}" width="150">
        </div>
        <hr>
    {% endfor %}
</body>
</html>
